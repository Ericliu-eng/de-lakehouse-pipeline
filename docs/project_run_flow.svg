<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">de-lakehouse-pipeline project run flow</title>
  <desc id="desc">Visual flow of commands, ingestion, transformation, incremental loading, marts, tests, and database tables.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .lane { fill: #ffffff; stroke: #d7dde8; stroke-width: 2; }
      .lane-title { font: 700 25px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #243044; }
      .box { stroke-width: 2.5; rx: 14; ry: 14; }
      .box-title { font: 700 21px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #142033; }
      .box-text { font: 16px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #2d3b53; }
      .small { font: 14px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #4a5870; }
      .mono { font: 15px Consolas, "Courier New", monospace; fill: #263244; }
      .arrow { fill: none; stroke: #4c617d; stroke-width: 3; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #7b8fa9; stroke-width: 2.5; stroke-dasharray: 8 7; marker-end: url(#arrow-soft); }
      .note { fill: #fff9e8; stroke: #f1c86b; stroke-width: 2; rx: 12; ry: 12; }
      .note-title { font: 700 18px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #6b4a00; }
      .note-text { font: 15px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #634b12; }
      .cmd { fill: #eef7ff; stroke: #75aadb; }
      .extract { fill: #eefaf4; stroke: #65b788; }
      .raw { fill: #fff6ed; stroke: #df9a58; }
      .transform { fill: #f1f0ff; stroke: #8d83d5; }
      .load { fill: #eef9fa; stroke: #5fb7bf; }
      .db { fill: #f4f7fb; stroke: #788aa4; }
      .mart { fill: #f5fbe9; stroke: #91b851; }
      .qa { fill: #fff0f4; stroke: #db7b95; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4c617d"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8fa9"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1040"/>

  <text x="70" y="70" style="font: 800 38px 'Microsoft YaHei','Segoe UI',Arial,sans-serif; fill:#152033;">de-lakehouse-pipeline 详细运行流程</text>
  <text x="70" y="108" style="font: 18px 'Microsoft YaHei','Segoe UI',Arial,sans-serif; fill:#526174;">从本地命令开始，到 API 抓取、raw 落盘、转换、增量入库、数据集市、质量验证与可视化。</text>

  <rect class="lane" x="55" y="145" width="1490" height="150"/>
  <text class="lane-title" x="80" y="186">1. 环境与数据库准备</text>
  <rect class="box cmd" x="80" y="210" width="220" height="58"/>
  <text class="box-title" x="105" y="246">make setup</text>
  <rect class="box cmd" x="345" y="210" width="220" height="58"/>
  <text class="box-title" x="370" y="246">make db-up</text>
  <rect class="box cmd" x="610" y="210" width="240" height="58"/>
  <text class="box-title" x="635" y="246">make db-migrate</text>
  <rect class="box db" x="900" y="198" width="575" height="82"/>
  <text class="box-title" x="925" y="230">Postgres schema</text>
  <text class="box-text" x="925" y="258">market_bars, load_metadata, pipeline_metadata, marts tables</text>
  <path class="arrow" d="M300 239 H345"/>
  <path class="arrow" d="M565 239 H610"/>
  <path class="arrow" d="M850 239 H900"/>

  <rect class="lane" x="55" y="325" width="1490" height="430"/>
  <text class="lane-title" x="80" y="366">2. 主链路：make run / cli run_stock</text>

  <rect class="box cmd" x="80" y="395" width="220" height="90"/>
  <text class="box-title" x="105" y="428">入口命令</text>
  <text class="mono" x="105" y="456">make run</text>
  <text class="small" x="105" y="476">python -m ...cli run_stock</text>

  <rect class="box cmd" x="350" y="395" width="250" height="90"/>
  <text class="box-title" x="375" y="428">CLI 调度</text>
  <text class="box-text" x="375" y="456">run_stock()</text>
  <text class="small" x="375" y="476">默认 symbol=AAPL, date=today</text>

  <rect class="box extract" x="650" y="395" width="255" height="90"/>
  <text class="box-title" x="675" y="428">Extract</text>
  <text class="box-text" x="675" y="456">fetch_daily_stock()</text>
  <text class="small" x="675" y="476">Alpha Vantage API + retry</text>

  <rect class="box raw" x="955" y="395" width="260" height="90"/>
  <text class="box-title" x="980" y="428">Raw 落盘</text>
  <text class="box-text" x="980" y="456">save_raw_data()</text>
  <text class="mono" x="980" y="476">data/raw/YYYY-MM-DD/stock.json</text>

  <rect class="box raw" x="1265" y="395" width="230" height="90"/>
  <text class="box-title" x="1290" y="428">Load raw</text>
  <text class="box-text" x="1290" y="456">load_raw_stock_json()</text>
  <text class="small" x="1290" y="476">读取 JSON payload</text>

  <path class="arrow" d="M300 440 H350"/>
  <path class="arrow" d="M600 440 H650"/>
  <path class="arrow" d="M905 440 H955"/>
  <path class="arrow" d="M1215 440 H1265"/>

  <rect class="box transform" x="80" y="555" width="270" height="92"/>
  <text class="box-title" x="105" y="588">Transform</text>
  <text class="box-text" x="105" y="616">parse_alpha_vantage_daily()</text>
  <text class="small" x="105" y="636">生成 ts, symbol, OHLC, volume</text>

  <rect class="box transform" x="405" y="555" width="260" height="92"/>
  <text class="box-title" x="430" y="588">日期过滤</text>
  <text class="box-text" x="430" y="616">只保留 target_date</text>
  <text class="small" x="430" y="636">没有当天数据则正常结束</text>

  <rect class="box load" x="720" y="555" width="270" height="92"/>
  <text class="box-title" x="745" y="588">连接数据库</text>
  <text class="box-text" x="745" y="616">load_db_config() / wait_for_db()</text>
  <text class="small" x="745" y="636">connect(Postgres)</text>

  <rect class="box load" x="1045" y="555" width="280" height="92"/>
  <text class="box-title" x="1070" y="588">增量控制</text>
  <text class="box-text" x="1070" y="616">get_last_watermark()</text>
  <text class="small" x="1070" y="636">filter_new_rows() 去掉旧数据</text>

  <path class="arrow" d="M1380 485 C1380 525 240 520 215 555"/>
  <path class="arrow" d="M350 601 H405"/>
  <path class="arrow" d="M665 601 H720"/>
  <path class="arrow" d="M990 601 H1045"/>

  <rect class="box db" x="95" y="700" width="305" height="92"/>
  <text class="box-title" x="120" y="733">事实表 upsert</text>
  <text class="box-text" x="120" y="761">upsert_stock_prices()</text>
  <text class="mono" x="120" y="781">market_bars(ts, symbol)</text>

  <rect class="box db" x="470" y="700" width="300" height="92"/>
  <text class="box-title" x="495" y="733">Watermark 更新</text>
  <text class="box-text" x="495" y="761">upsert_watermark()</text>
  <text class="mono" x="495" y="781">pipeline_metadata</text>

  <rect class="box db" x="840" y="700" width="300" height="92"/>
  <text class="box-title" x="865" y="733">Load metadata</text>
  <text class="box-text" x="865" y="761">record_load()</text>
  <text class="mono" x="865" y="781">load_metadata</text>

  <rect class="box load" x="1210" y="700" width="250" height="92"/>
  <text class="box-title" x="1235" y="733">提交事务</text>
  <text class="box-text" x="1235" y="761">conn.commit()</text>
  <text class="small" x="1235" y="781">主链路成功结束</text>

  <path class="arrow" d="M1185 647 C1185 680 260 666 248 700"/>
  <path class="arrow" d="M400 746 H470"/>
  <path class="arrow" d="M770 746 H840"/>
  <path class="arrow" d="M1140 746 H1210"/>

  <rect class="lane" x="55" y="785" width="1490" height="155"/>
  <text class="lane-title" x="80" y="826">3. 数据集市、回填、验证与查看</text>

  <rect class="box mart" x="80" y="850" width="305" height="72"/>
  <text class="box-title" x="105" y="880">make run-marts</text>
  <text class="small" x="105" y="905">daily summary → latest price → volume rank</text>

  <rect class="box cmd" x="435" y="850" width="300" height="72"/>
  <text class="box-title" x="460" y="880">cli backfill --start --end</text>
  <text class="small" x="460" y="905">按日期循环调用 run_stock_for_date()</text>

  <rect class="box qa" x="785" y="850" width="300" height="72"/>
  <text class="box-title" x="810" y="880">make test / smoke</text>
  <text class="small" x="810" y="905">unit, integration, smoke, SQL checks</text>

  <rect class="box mart" x="1135" y="850" width="340" height="72"/>
  <text class="box-title" x="1160" y="880">make db-visu</text>
  <text class="small" x="1160" y="905">Tk + pandastable 查看 mart_symbol_latest_price</text>

  <path class="arrow-soft" d="M247 792 C247 820 232 828 232 850"/>
  <path class="arrow-soft" d="M585 850 C585 810 190 810 190 485"/>
  <path class="arrow-soft" d="M990 792 C990 824 935 826 935 850"/>
  <path class="arrow-soft" d="M1335 792 C1335 824 1305 826 1305 850"/>

  <rect class="note" x="70" y="965" width="1460" height="48"/>
  <text class="note-title" x="95" y="995">关键思想：</text>
  <text class="note-text" x="190" y="995">raw JSON 保留原始证据；watermark 保证重复运行不会重复加载；marts 把明细行情整理成面向查询/展示的结果表；测试与 smoke 验证保证链路可复现。</text>
</svg>
