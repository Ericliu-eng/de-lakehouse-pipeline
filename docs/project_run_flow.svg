<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Market Data Lakehouse end-to-end execution flow</title>
  <desc id="desc">English architecture flow showing environment setup, incremental ingestion, quality gates, analytical marts, serving, testing, backfills, and operational evidence.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071426"/>
      <stop offset="100%" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="headerAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#22d3a6"/>
      <stop offset="100%" stop-color="#a3e635"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <style>
      .title { font: 800 38px "Segoe UI", Arial, sans-serif; fill: #f8fafc; letter-spacing: -0.5px; }
      .subtitle { font: 17px "Segoe UI", Arial, sans-serif; fill: #b8c7d9; }
      .lane { fill: #f8fafc; stroke: #dbe5ef; stroke-width: 1.5; rx: 18; }
      .lane-label { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #0f766e; letter-spacing: 1.8px; }
      .lane-title { font: 750 23px "Segoe UI", Arial, sans-serif; fill: #122033; }
      .box { stroke-width: 2; rx: 14; filter: url(#shadow); }
      .box-title { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #102033; }
      .box-text { font: 14px "Segoe UI", Arial, sans-serif; fill: #475569; }
      .box-mono { font: 13px Consolas, "Courier New", monospace; fill: #334155; }
      .step { font: 800 13px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
      .arrow-green { fill: none; stroke: #10b981; stroke-width: 3; marker-end: url(#arrowGreen); }
      .arrow-dash { fill: none; stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .command { fill: #eff6ff; stroke: #60a5fa; }
      .source { fill: #ecfeff; stroke: #22b8cf; }
      .raw { fill: #fff7ed; stroke: #fb923c; }
      .process { fill: #f5f3ff; stroke: #8b5cf6; }
      .state { fill: #f0fdfa; stroke: #14b8a6; }
      .database { fill: #f1f5f9; stroke: #64748b; }
      .quality { fill: #fff1f2; stroke: #fb7185; }
      .delivery { fill: #f7fee7; stroke: #84cc16; }
      .ops { fill: #ffffff; stroke: #cbd5e1; }
      .chip { fill: #e2e8f0; rx: 8; }
      .chip-text { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .footer-title { font: 700 15px "Segoe UI", Arial, sans-serif; fill: #dffbf2; }
      .footer-text { font: 14px "Segoe UI", Arial, sans-serif; fill: #c8d6e5; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#background)"/>
  <rect x="0" y="0" width="1600" height="7" fill="url(#headerAccent)"/>

  <text id="titleText" class="title" x="64" y="64">Market Data Lakehouse - End-to-End Execution Flow</text>
  <text class="subtitle" x="64" y="96">Reproducible setup, incremental ingestion, quality-gated transformation, and curated delivery</text>
  <rect x="1300" y="42" width="236" height="43" rx="21" fill="#123b53" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="1330" cy="63.5" r="7" fill="#22d3a6"/>
  <text x="1348" y="69" style="font:700 14px 'Segoe UI',Arial,sans-serif;fill:#e0f2fe;letter-spacing:.6px;">PRODUCTION-STYLE</text>

  <!-- Lane 1: bootstrap -->
  <rect class="lane" x="48" y="126" width="1504" height="146"/>
  <text class="lane-label" x="76" y="158">01 / BOOTSTRAP</text>
  <text class="lane-title" x="76" y="190">Reproducible Local Environment</text>

  <rect class="box command" x="380" y="158" width="238" height="78"/>
  <circle cx="404" cy="181" r="14" fill="#3b82f6"/><text class="step" x="400" y="186">1</text>
  <text class="box-title" x="426" y="187">Create Environment</text>
  <text class="box-mono" x="404" y="216">make setup</text>

  <rect class="box command" x="684" y="158" width="238" height="78"/>
  <circle cx="708" cy="181" r="14" fill="#3b82f6"/><text class="step" x="704" y="186">2</text>
  <text class="box-title" x="730" y="187">Start PostgreSQL</text>
  <text class="box-mono" x="708" y="216">make db-up</text>

  <rect class="box database" x="988" y="158" width="298" height="78"/>
  <circle cx="1012" cy="181" r="14" fill="#475569"/><text class="step" x="1008" y="186">3</text>
  <text class="box-title" x="1034" y="187">Apply Versioned Schema</text>
  <text class="box-mono" x="1012" y="216">make db-migrate</text>

  <path class="arrow" d="M618 197 H684"/>
  <path class="arrow" d="M922 197 H988"/>

  <!-- Lane 2: ingestion -->
  <rect class="lane" x="48" y="292" width="1504" height="330"/>
  <text class="lane-label" x="76" y="324">02 / INCREMENTAL INGESTION</text>
  <text class="lane-title" x="76" y="356">Auditable Source-to-Warehouse Pipeline</text>
  <rect x="1261" y="313" width="251" height="31" class="chip"/>
  <text class="chip-text" x="1280" y="334">ENTRY POINT / make run SYMBOL=AAPL</text>

  <rect class="box command" x="78" y="390" width="196" height="102"/>
  <text class="box-title" x="100" y="420">CLI Entry Point</text>
  <text class="box-mono" x="100" y="448">run_stock()</text>
  <text class="box-text" x="100" y="473">Symbol-aware execution</text>

  <rect class="box source" x="316" y="390" width="196" height="102"/>
  <text class="box-title" x="338" y="420">Extract</text>
  <text class="box-mono" x="338" y="448">Alpha Vantage API</text>
  <text class="box-text" x="338" y="473">Retry transient failures</text>

  <rect class="box raw" x="554" y="390" width="196" height="102"/>
  <text class="box-title" x="576" y="420">Preserve Raw</text>
  <text class="box-mono" x="576" y="448">data/raw/YYYY-MM-DD</text>
  <text class="box-text" x="576" y="473">Immutable JSON evidence</text>

  <rect class="box process" x="792" y="390" width="196" height="102"/>
  <text class="box-title" x="814" y="420">Normalize</text>
  <text class="box-mono" x="814" y="448">parse + validate</text>
  <text class="box-text" x="814" y="473">Typed market-bar rows</text>

  <rect class="box state" x="1030" y="390" width="208" height="102"/>
  <text class="box-title" x="1052" y="420">Incremental Filter</text>
  <text class="box-mono" x="1052" y="448">get_last_watermark()</text>
  <text class="box-text" x="1052" y="473">Keep only newer records</text>

  <rect class="box database" x="1280" y="390" width="194" height="102"/>
  <text class="box-title" x="1302" y="420">Transactional Load</text>
  <text class="box-mono" x="1302" y="448">upsert + commit</text>
  <text class="box-text" x="1302" y="473">Atomic state transition</text>

  <path class="arrow" d="M274 441 H316"/>
  <path class="arrow" d="M512 441 H554"/>
  <path class="arrow" d="M750 441 H792"/>
  <path class="arrow" d="M988 441 H1030"/>
  <path class="arrow" d="M1238 441 H1280"/>

  <rect class="box database" x="450" y="531" width="220" height="63"/>
  <text class="box-title" x="472" y="557">market_bars</text>
  <text class="box-text" x="472" y="579">Normalized fact table</text>

  <rect class="box state" x="716" y="531" width="244" height="63"/>
  <text class="box-title" x="738" y="557">pipeline_metadata</text>
  <text class="box-text" x="738" y="579">Watermark and run state</text>

  <rect class="box database" x="1006" y="531" width="220" height="63"/>
  <text class="box-title" x="1028" y="557">load_metadata</text>
  <text class="box-text" x="1028" y="579">Operational audit trail</text>

  <path class="arrow-dash" d="M1377 492 C1377 516 1200 516 1116 531"/>
  <path class="arrow-dash" d="M1377 492 C1377 520 900 510 838 531"/>
  <path class="arrow-dash" d="M1377 492 C1377 527 650 508 560 531"/>

  <!-- Lane 3: quality and delivery -->
  <rect class="lane" x="48" y="642" width="1504" height="176"/>
  <text class="lane-label" x="76" y="674">03 / QUALITY-GATED DELIVERY</text>
  <text class="lane-title" x="76" y="706">Trusted Curated</text>
  <text class="lane-title" x="76" y="734">Data Products</text>

  <rect class="box command" x="342" y="676" width="220" height="102"/>
  <text class="box-title" x="364" y="706">Orchestration</text>
  <text class="box-mono" x="364" y="734">make orchestrate</text>
  <text class="box-text" x="364" y="759">Step metrics + fail fast</text>

  <rect class="box quality" x="608" y="676" width="220" height="102"/>
  <text class="box-title" x="630" y="706">Quality Gate</text>
  <text class="box-mono" x="630" y="734">nulls + uniqueness</text>
  <text class="box-text" x="630" y="759">Block invalid publication</text>

  <rect class="box delivery" x="874" y="676" width="220" height="102"/>
  <text class="box-title" x="896" y="706">Analytical Marts</text>
  <text class="box-mono" x="896" y="734">make run-marts</text>
  <text class="box-text" x="896" y="759">Query-ready outputs</text>

  <rect class="box delivery" x="1140" y="676" width="220" height="102"/>
  <text class="box-title" x="1162" y="706">API + Dashboard</text>
  <text class="box-mono" x="1162" y="734">FastAPI / Uvicorn</text>
  <text class="box-text" x="1162" y="759">Curated serving layer</text>

  <path class="arrow-green" d="M562 727 H608"/>
  <path class="arrow-green" d="M828 727 H874"/>
  <path class="arrow-green" d="M1094 727 H1140"/>

  <!-- Lane 4: operational capabilities -->
  <rect class="lane" x="48" y="838" width="1504" height="112"/>
  <text class="lane-label" x="76" y="870">04 / OPERATIONAL CONTROLS</text>

  <rect class="box ops" x="300" y="858" width="262" height="67"/>
  <text class="box-title" x="322" y="885">Safe Backfills</text>
  <text class="box-mono" x="322" y="909">make backfill START=... END=...</text>

  <rect class="box ops" x="606" y="858" width="238" height="67"/>
  <text class="box-title" x="628" y="885">Automated Validation</text>
  <text class="box-mono" x="628" y="909">make lint + make test</text>

  <rect class="box ops" x="888" y="858" width="238" height="67"/>
  <text class="box-title" x="910" y="885">Reliability Signals</text>
  <text class="box-text" x="910" y="909">Freshness / latency / failures</text>

  <rect class="box ops" x="1170" y="858" width="238" height="67"/>
  <text class="box-title" x="1192" y="885">Reviewable Evidence</text>
  <text class="box-mono" x="1192" y="909">docs/proof/&lt;milestone&gt;/</text>

  <!-- Footer -->
  <circle cx="72" cy="977" r="5" fill="#22d3a6"/>
  <text class="footer-title" x="88" y="982">Engineering guarantees:</text>
  <text class="footer-text" x="260" y="982">idempotent reruns</text>
  <circle cx="394" cy="977" r="3" fill="#64748b"/>
  <text class="footer-text" x="408" y="982">raw-data auditability</text>
  <circle cx="566" cy="977" r="3" fill="#64748b"/>
  <text class="footer-text" x="580" y="982">watermark safety</text>
  <circle cx="708" cy="977" r="3" fill="#64748b"/>
  <text class="footer-text" x="722" y="982">quality-gated marts</text>
  <circle cx="894" cy="977" r="3" fill="#64748b"/>
  <text class="footer-text" x="908" y="982">reproducible commands</text>
</svg>
